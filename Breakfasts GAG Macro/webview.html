<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Breakfasts GAG2 Macro</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #101316;
    --panel: #181d22;
    --panel-2: #20262d;
    --text: #eef2f5;
    --muted: #9aa6b2;
    --line: #303842;
    --accent: #49b37d;
    --accent-dark: #2e7b56;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Arial, sans-serif;
  }

  .app {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 14px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 650;
  }

  .actions {
    display: flex;
    gap: 8px;
  }

  button {
    min-height: 34px;
    border: 0;
    border-radius: 6px;
    padding: 0 12px;
    background: var(--panel-2);
    color: var(--text);
    font: inherit;
    cursor: pointer;
  }

  button.primary {
    background: var(--accent);
    color: #07130d;
    font-weight: 700;
  }

  button:hover {
    filter: brightness(1.08);
  }

  section {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
  }

  .fields {
    display: grid;
    gap: 10px;
  }

  label.field {
    display: grid;
    gap: 5px;
  }

  .field span,
  h2 {
    color: var(--muted);
    font-size: 12px;
    font-weight: 650;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h2 {
    margin: 0 0 10px;
  }

  input[type="text"],
  input[type="url"] {
    width: 100%;
    min-height: 34px;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px 8px;
    background: #0f1215;
    color: var(--text);
    font: inherit;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
  }

  .check {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 34px;
    padding: 7px 8px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #12161a;
    overflow: hidden;
  }

  .check span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  input[type="checkbox"] {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
    flex: 0 0 auto;
  }

  .empty {
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>
<main class="app">
  <header>
    <h1>Panel</h1>
    <div class="actions">
      <button id="save" class="primary" type="button">Save</button>
      <button id="start" type="button">Start</button>
    </div>
  </header>

  <section>
    <div class="fields">
      <label class="field">
        <span>Navigation Key</span>
        <input id="navKey" type="text" autocomplete="off">
      </label>
      <label class="field">
        <span>Private Server Link</span>
        <input id="privateServer" type="url" autocomplete="off">
      </label>
      <label class="field">
        <span>Webhook Link</span>
        <input id="webhook" type="url" autocomplete="off">
      </label>
    </div>
  </section>

  <section>
    <h2>Seeds</h2>
    <div id="seeds" class="grid">
      <div class="empty">Loading seeds...</div>
    </div>
  </section>

  <section>
    <h2>Gear</h2>
    <div id="gears" class="grid">
      <div class="empty">Loading gear...</div>
    </div>
  </section>
</main>

<script>
  const state = {
    seeds: new Map(),
    gears: new Map()
  };

  const els = {
    navKey: document.getElementById("navKey"),
    privateServer: document.getElementById("privateServer"),
    webhook: document.getElementById("webhook"),
    seeds: document.getElementById("seeds"),
    gears: document.getElementById("gears"),
    save: document.getElementById("save"),
    start: document.getElementById("start")
  };

  function displayName(value) {
    return value
      .replace(/Seed$/, " Seed")
      .replace(/([a-z0-9])([A-Z])/g, "$1 $2");
  }

  function setInput(id, value) {
    if (els[id]) {
      els[id].value = value;
    }
  }

  function renderChecks(container, items, type) {
    container.innerHTML = "";

    if (!items.size) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No items found.";
      container.appendChild(empty);
      return;
    }

    for (const [name, checked] of items) {
      const label = document.createElement("label");
      label.className = "check";

      const input = document.createElement("input");
      input.type = "checkbox";
      input.dataset.type = type;
      input.dataset.name = name;
      input.checked = checked === "1";

      const text = document.createElement("span");
      text.textContent = displayName(name);
      text.title = name;

      label.append(input, text);
      container.appendChild(label);
    }
  }

  function render() {
    renderChecks(els.seeds, state.seeds, "seed");
    renderChecks(els.gears, state.gears, "gear");
  }

  function handleLoad(message) {
    state.seeds.clear();
    state.gears.clear();

    for (const part of message.split("|").slice(1)) {
      if (part.startsWith("navKey=")) {
        setInput("navKey", part.slice("navKey=".length));
      } else if (part.startsWith("privateServer=")) {
        setInput("privateServer", part.slice("privateServer=".length));
      } else if (part.startsWith("webhook=")) {
        setInput("webhook", part.slice("webhook=".length));
      } else if (part.startsWith("seed:")) {
        const [name, value = "0"] = part.slice("seed:".length).split("=");
        state.seeds.set(name, value);
      } else if (part.startsWith("gear:")) {
        const [name, value = "0"] = part.slice("gear:".length).split("=");
        state.gears.set(name, value);
      }
    }

    render();
  }

  function collectMessage() {
    const parts = [
      "save",
      `navKey=${els.navKey.value}`,
      `privateServer=${els.privateServer.value}`,
      `webhook=${els.webhook.value}`
    ];

    document.querySelectorAll("input[type='checkbox']").forEach((input) => {
      parts.push(`${input.dataset.type}:${input.dataset.name}=${input.checked ? "1" : "0"}`);
    });

    return parts.join("|");
  }

  window.chrome.webview.addEventListener("message", (event) => {
    const message = String(event.data || "");
    if (message.startsWith("load")) {
      handleLoad(message);
    }
  });

  els.save.addEventListener("click", () => {
    window.chrome.webview.postMessage(collectMessage());
  });

  els.start.addEventListener("click", () => {
    window.chrome.webview.postMessage("start");
  });
</script>
</body>
</html>
